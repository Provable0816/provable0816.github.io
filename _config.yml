# ============================================================
# GitHub Pages Jekyll 站点配置文件
# ============================================================
# 这是 Jekyll 站点的核心配置文件，所有站点级别的设置都在这里
# 修改此文件后，GitHub 会自动重新构建您的站点

# ------------------------------------------------------------
# 基础站点信息
# ------------------------------------------------------------
title: "我的个人网站"                    # 网站标题，显示在浏览器标签页和页面标题
description: "这是我的 GitHub Pages 个人网站"  # 网站描述，用于 SEO 和社交媒体分享
author: "你的名字"                       # 作者名称
email: "your-email@example.com"         # 联系邮箱

# ------------------------------------------------------------
# GitHub Pages 设置
# ------------------------------------------------------------
# 使用 GitHub 官方主题（可选，删除此行可使用自定义主题）
remote_theme: pages-themes/minimal@v0.2.0

# 包含 Jekyll 默认插件
plugins:
  - jekyll-remote-theme

# ------------------------------------------------------------
# 构建设置
# ------------------------------------------------------------
markdown: kramdown           # Markdown 解析器（推荐 kramdown）
highlighter: rouge           # 代码高亮器
timezone: Asia/Shanghai      # 时区设置

# 永久链接格式（文章 URL 格式）
# 可选：date, pretty, ordinal, none, 或自定义格式
permalink: /:year/:month/:day/:title/

# ------------------------------------------------------------
# 导航菜单设置
# ------------------------------------------------------------
# 在此添加您的导航链接，会在页面顶部显示
navigation:
  - name: "首页"
    url: "/"
  - name: "关于"
    url: "/about/"
  - name: "博客"
    url: "/blog/"
  # 添加更多菜单项...
  # - name: "项目"
  #   url: "/projects/"

# ------------------------------------------------------------
# 社交媒体链接（可选）
# ------------------------------------------------------------
social:
  github: "your-username"
  twitter: "your-username"
  # weibo: "your-username"
  # zhihu: "your-username"

# ------------------------------------------------------------
# 高级设置（通常不需要修改）
# ------------------------------------------------------------
# 排除不需要的文件和目录
exclude:
  - README.md
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - vendor

# 包含隐藏文件夹（Jekyll 默认忽略以下划线开头的文件夹）
include:
  - _pages

# 未来日期的文章是否发布
future: false

# 草稿文章是否发布
show_drafts: false
