<!DOCTYPE html>
<!-- ============================================================
     普通页面布局模板 (_layouts/page.html)
     用于 about.md 等独立页面
============================================================= -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 页面标题 -->
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    
    <!-- 页面描述（SEO） -->
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    
    <!-- 作者信息 -->
    <meta name="author" content="{{ site.author }}">
    
    <!-- Open Graph / 社交媒体分享 -->
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    
    <!-- CSS 样式 -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <!-- 页面头部 -->
    <header class="site-header">
        <div class="container">
            <a href="{{ '/' | relative_url }}" class="site-title">
                {{ site.title }}
            </a>
            
            <nav class="site-nav">
                {% for item in site.navigation %}
                <a href="{{ item.url | relative_url }}" class="nav-link">
                    {{ item.name }}
                </a>
                {% endfor %}
            </nav>
        </div>
    </header>

    <!-- 主内容区域 -->
    <main class="site-main">
        <div class="container">
            <!-- 页面标题 -->
            {% if page.title %}
            <h1 class="page-title">{{ page.title }}</h1>
            {% endif %}
            
            <!-- 页面内容 -->
            <div class="page-content">
                {{ content }}
            </div>
        </div>
    </main>

    <!-- 页面底部 -->
    <footer class="site-footer">
        <div class="container">
            <p class="copyright">
                &copy; {{ site.time | date: '%Y' }} {{ site.author }}. 
                使用 <a href="https://pages.github.com/" target="_blank">GitHub Pages</a> 
                和 <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> 构建。
            </p>
        </div>
    </footer>
</body>
</html>
